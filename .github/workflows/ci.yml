name: Integração contínua

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Qualidade e testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar ferramenta de qualidade
        run: python -m pip install --upgrade ruff

      - name: Validar sintaxe
        run: python -m compileall -q src tests run.py

      - name: Normalizar e analisar qualidade do código
        run: ruff check --fix src tests run.py

      - name: Executar testes automatizados
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
